apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.minio.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.minio.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.minio.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.minio.name }}
    spec:
      containers:
      - name: minio
        image: {{ .Values.minio.image }}
        args:
        - server
        - {{ .Values.minio.mountPath }}
        - --console-address
        - ":{{ .Values.minio.consolePort }}"
        env:
        - name: MINIO_ROOT_USER
          value: {{ .Values.minio.accessKey }}
        - name: MINIO_ROOT_PASSWORD
          value: {{ .Values.minio.secretKey }}
        ports:
        - containerPort: {{ .Values.minio.port }}
        - containerPort: {{ .Values.minio.consolePort }}
        volumeMounts:
        - name: minio-data
          mountPath: {{ .Values.minio.mountPath }}
      volumes:
      - name: minio-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.minio.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.minio.name }}
  ports:
  - name: api
    port: {{ .Values.minio.port }}
    targetPort: {{ .Values.minio.port }}
  - name: console
    port: {{ .Values.minio.consolePort }}
    targetPort: {{ .Values.minio.consolePort }}
